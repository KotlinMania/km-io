name: Build (iOS)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (iOS)
    runs-on: macos-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      # km-io does not ship an XCFramework (the convention plugin
      # configures `iosArm64()`, `iosX64()`, `iosSimulatorArm64()` as
      # plain native targets without `binaries.framework`), so the
      # workflow only covers compile + simulator test.
      - name: Build and test iOS targets
        run: >
          ./gradlew
          compileKotlinIosArm64
          compileKotlinIosX64
          compileKotlinIosSimulatorArm64
          iosSimulatorArm64Test
          --no-configuration-cache

      - name: Upload test reports (iOS)
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-ios
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
          if-no-files-found: warn
