name: Build (WASM)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (WASM)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Set up Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          check-latest: true

      - name: Set up Yarn
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate

      - name: Check JavaScript toolchain
        run: |
          node --version
          npm --version
          yarn --version

      # km-io's wasmJs.browser() target is currently disabled in
      # core/build.gradle.kts (KT-58291 filter-exclude workaround), so
      # wasmJsBrowserTest is not invoked here. wasmJsNodeTest and
      # wasmWasiNodeTest both exercise the wasi-preview1 shim under Node
      # 24+. The runner is pinned to 24.x because the generated
      # wasmWasiNodeTest driver calls APIs that only exist on Node 24+
      # ("Krypton" LTS).
      - name: Build and test WASM targets
        env:
          ORG_GRADLE_PROJECT_kotlin_js_yarn_download: "false"
        run: >
          ./gradlew
          wasmJsNodeTest
          wasmWasiNodeTest
          --no-configuration-cache

      - name: Upload test reports (WASM)
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-wasm
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
          if-no-files-found: warn
