name: Build (Android)

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    name: Build and Test (Android)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: zulu
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      # The root build.gradle.kts installs a project-local Android SDK at
      # configuration time via installProjectAndroidSdk(...), so no
      # android-actions/setup-android step is needed — the SDK lives under
      # .android-sdk/ inside the repo. Calling setupAndroidSdk first
      # surfaces any installer failure as its own step rather than getting
      # buried in the compile output.
      - name: Install project-local Android SDK
        run: ./gradlew setupAndroidSdk --no-configuration-cache

      - name: Build and test Android targets
        # Unqualified task names propagate to every subproject that
        # declares them (:km-io-core, :km-io-bytestring, :km-io-okio).
        run: >
          ./gradlew
          compileAndroidMain
          assembleUnitTest
          assembleAndroidTest
          testAndroidHostTest
          --no-configuration-cache

      - name: Upload test reports (Android)
        if: success() || failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-reports-android
          path: |
            **/build/reports/tests/
            **/build/test-results/
          retention-days: 7
          if-no-files-found: warn
